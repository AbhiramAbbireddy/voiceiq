org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=192m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.workers.max=2
android.useAndroidX=true
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process

# Prevent Gradle from using excessive RAM by disabling the background daemon
org.gradle.daemon=false
org.gradle.parallel=false
