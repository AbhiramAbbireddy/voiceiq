spring:
  port: 9090
  application:
    name: voiceiq-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/voiceiq}
    username: postgres
    password: abhiram123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}

  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:25MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:25MB}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

jwt:
  issuer: ${JWT_ISSUER:voiceiq}
  secret: ${JWT_SECRET:change-me-to-a-very-long-secret-key}
  expiration: ${JWT_EXPIRATION_MS:86400000}

openai:
  enabled: false
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  whisper-url: ${OPENAI_WHISPER_URL:https://api.openai.com/v1/audio/transcriptions}
  transcription-model: ${OPENAI_TRANSCRIPTION_MODEL:gpt-4o-mini-transcribe}
  feedback-model: ${OPENAI_FEEDBACK_MODEL:gpt-4o-mini}

# ── Self-hosted Faster-Whisper transcription (no API key, no rate limits) ──
whisper:
  enabled: ${WHISPER_ENABLED:true}
  service-url: ${WHISPER_SERVICE_URL:http://localhost:9000}

# ── Gemini AI coaching (free tier: 1500 requests/day) ──────────────────────
gemini:
  enabled: ${GEMINI_ENABLED:true}
  api-key: ${GEMINI_API_KEY:AIzaSyBUlFcCa2n-TndYNouMp7xf5mpfjb57Nik}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
  model: ${GEMINI_MODEL:gemini-2.0-flash}

voiceiq:
  analysis:
    dispatcher: ${VOICEIQ_ANALYSIS_DISPATCHER:rabbit}
    exchange: ${VOICEIQ_ANALYSIS_EXCHANGE:voiceiq.analysis.exchange}
    queue: ${VOICEIQ_ANALYSIS_QUEUE:voiceiq.analysis.queue}
    routing-key: ${VOICEIQ_ANALYSIS_ROUTING_KEY:voiceiq.analysis.process}
    retry-queue: ${VOICEIQ_ANALYSIS_RETRY_QUEUE:voiceiq.analysis.retry.queue}
    retry-routing-key: ${VOICEIQ_ANALYSIS_RETRY_ROUTING_KEY:voiceiq.analysis.retry}
    dead-letter-queue: ${VOICEIQ_ANALYSIS_DLQ:voiceiq.analysis.dlq}
    dead-letter-routing-key: ${VOICEIQ_ANALYSIS_DLQ_ROUTING_KEY:voiceiq.analysis.dead}
    retry-delay-ms: ${VOICEIQ_ANALYSIS_RETRY_DELAY_MS:10000}
    max-attempts: ${VOICEIQ_ANALYSIS_MAX_ATTEMPTS:3}
  storage:
    provider: ${VOICEIQ_STORAGE_PROVIDER:local}
    local-root-url: ${VOICEIQ_STORAGE_LOCAL_ROOT_URL:http://localhost:8080/uploads}
    local-directory: ${VOICEIQ_STORAGE_LOCAL_DIRECTORY:uploads}
    upload-url-expiry-minutes: ${VOICEIQ_STORAGE_UPLOAD_URL_EXPIRY_MINUTES:15}
    s3:
      bucket: ${VOICEIQ_STORAGE_S3_BUCKET:}
      region: ${VOICEIQ_STORAGE_S3_REGION:ap-south-1}
      key-prefix: ${VOICEIQ_STORAGE_S3_KEY_PREFIX:recordings}
      endpoint-override: ${VOICEIQ_STORAGE_S3_ENDPOINT_OVERRIDE:}
      public-base-url: ${VOICEIQ_STORAGE_S3_PUBLIC_BASE_URL:}
  defaults:
    sample-report-score: 74
    sample-pace-score: 82
    sample-clarity-score: 76
    sample-confidence-score: 68
    sample-filler-score: 55
  limits:
    free:
      monthly-sessions: ${VOICEIQ_LIMIT_FREE_MONTHLY_SESSIONS:10}
      monthly-processed-seconds: ${VOICEIQ_LIMIT_FREE_MONTHLY_PROCESSED_SECONDS:900}
    pro:
      monthly-sessions: ${VOICEIQ_LIMIT_PRO_MONTHLY_SESSIONS:1000}
      monthly-processed-seconds: ${VOICEIQ_LIMIT_PRO_MONTHLY_PROCESSED_SECONDS:72000}
  developer:
    emails:
      - abhiram.wordweaver@gmail.com
      - gsvmkumar07@gmail.com

logging:
  level:
    com.voiceiq: INFO
    org.springframework.security: WARN
